<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0f3a"/>
      <stop offset="100%" stop-color="#07050f"/>
    </radialGradient>

    <linearGradient id="flameOuter" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#e8830d"/>
      <stop offset="50%"  stop-color="#c46fef"/>
      <stop offset="100%" stop-color="#5a189a" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="flameInner" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#ffd166"/>
      <stop offset="55%"  stop-color="#fff8e0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Left wing: dark outer edge, lighter near flame -->
    <linearGradient id="wL" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#130528" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#5b1fa0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9b5de5" stop-opacity="0.70"/>
    </linearGradient>

    <!-- Right wing: mirror -->
    <linearGradient id="wR" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%"   stop-color="#130528" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#5b1fa0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#9b5de5" stop-opacity="0.70"/>
    </linearGradient>

    <filter id="flameGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="tipGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" ry="90" fill="url(#bgGrad)"/>

  <!-- ═══════════════════════════════════════════════
       LEFT WING — part du côté de la flamme, s'ouvre
       à gauche, se referme vers le bas
       ═══════════════════════════════════════════════ -->

  <!-- Corps principal de l'aile gauche -->
  <path d="
    M 228,232
    C 195,212 130,196 76,214
    C 40,227 33,268 48,310
    C 60,344 97,370 140,386
    C 174,398 212,394 228,378
    Z"
    fill="url(#wL)"/>

  <!-- Couvertures secondaires (surface supérieure, plus claire) -->
  <path d="
    M 226,238
    C 196,224 148,214 104,230
    C 70,243 62,275 78,310
    C 90,337 122,358 158,372
    C 184,382 213,378 226,363
    Z"
    fill="#b07ef8" opacity="0.18"/>

  <!-- Lignes de plumes de couverture -->
  <path d="M 218,250 C 186,240 150,234 112,242" fill="none" stroke="#c4a0ff" stroke-width="1.3" opacity="0.40"/>
  <path d="M 212,272 C 178,265 140,261 102,270" fill="none" stroke="#c4a0ff" stroke-width="1.3" opacity="0.34"/>
  <path d="M 205,296 C 170,291 132,290  94,302" fill="none" stroke="#c4a0ff" stroke-width="1.3" opacity="0.28"/>

  <!-- Plumes primaires gauche (formes de plumes individuelles sur le bord arrière) -->
  <!-- Plume 1 — extrémité extérieure -->
  <path d="M 48,310 C 35,332 40,358 56,368 C 68,376 82,371 85,358 C 74,342 58,324 48,310 Z"
    fill="#3d1568" opacity="0.90"/>
  <path d="M 48,310 C 37,334 42,360 56,370" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.60"/>

  <!-- Plume 2 -->
  <path d="M 76,350 C 62,372 68,398 86,408 C 100,416 115,410 117,396 C 107,382 89,364 76,350 Z"
    fill="#3d1568" opacity="0.85"/>
  <path d="M 76,350 C 63,374 69,400 86,410" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.55"/>

  <!-- Plume 3 -->
  <path d="M 108,374 C 96,396 104,420 123,428 C 138,434 153,426 153,412 C 143,400 124,385 108,374 Z"
    fill="#3d1568" opacity="0.80"/>
  <path d="M 108,374 C 97,398 105,422 123,430" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.50"/>

  <!-- Plume 4 -->
  <path d="M 146,388 C 137,409 146,432 165,438 C 180,443 195,433 192,418 C 182,408 163,396 146,388 Z"
    fill="#3d1568" opacity="0.75"/>
  <path d="M 146,388 C 138,411 147,434 165,440" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.44"/>

  <!-- Plume 5 — plus proche du corps -->
  <path d="M 186,394 C 179,413 189,434 207,438 C 221,441 232,430 229,415 C 220,407 202,399 186,394 Z"
    fill="#3d1568" opacity="0.70"/>
  <path d="M 186,394 C 180,414 190,436 207,440" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.38"/>

  <!-- Bord d'attaque (leading edge highlight) -->
  <path d="
    M 228,232
    C 195,212 130,196 76,214
    C 40,227 33,268 48,310"
    fill="none" stroke="#c4a0ff" stroke-width="1.6" opacity="0.38"/>

  <!-- ═══════════════════════════════════════════════
       RIGHT WING — miroir de la gauche
       ═══════════════════════════════════════════════ -->

  <!-- Corps principal de l'aile droite -->
  <path d="
    M 284,232
    C 317,212 382,196 436,214
    C 472,227 479,268 464,310
    C 452,344 415,370 372,386
    C 338,398 300,394 284,378
    Z"
    fill="url(#wR)"/>

  <!-- Couvertures secondaires droite -->
  <path d="
    M 286,238
    C 316,224 364,214 408,230
    C 442,243 450,275 434,310
    C 422,337 390,358 354,372
    C 328,382 299,378 286,363
    Z"
    fill="#b07ef8" opacity="0.18"/>

  <!-- Lignes de couverture droite -->
  <path d="M 294,250 C 326,240 362,234 400,242" fill="none" stroke="#c4a0ff" stroke-width="1.3" opacity="0.40"/>
  <path d="M 300,272 C 334,265 372,261 410,270" fill="none" stroke="#c4a0ff" stroke-width="1.3" opacity="0.34"/>
  <path d="M 307,296 C 342,291 380,290 418,302" fill="none" stroke="#c4a0ff" stroke-width="1.3" opacity="0.28"/>

  <!-- Plumes primaires droite -->
  <!-- Plume 1 -->
  <path d="M 464,310 C 477,332 472,358 456,368 C 444,376 430,371 427,358 C 438,342 454,324 464,310 Z"
    fill="#3d1568" opacity="0.90"/>
  <path d="M 464,310 C 475,334 470,360 456,370" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.60"/>

  <!-- Plume 2 -->
  <path d="M 436,350 C 450,372 444,398 426,408 C 412,416 397,410 395,396 C 405,382 423,364 436,350 Z"
    fill="#3d1568" opacity="0.85"/>
  <path d="M 436,350 C 449,374 443,400 426,410" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.55"/>

  <!-- Plume 3 -->
  <path d="M 404,374 C 416,396 408,420 389,428 C 374,434 359,426 359,412 C 369,400 388,385 404,374 Z"
    fill="#3d1568" opacity="0.80"/>
  <path d="M 404,374 C 415,398 407,422 389,430" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.50"/>

  <!-- Plume 4 -->
  <path d="M 366,388 C 375,409 366,432 347,438 C 332,443 317,433 320,418 C 330,408 349,396 366,388 Z"
    fill="#3d1568" opacity="0.75"/>
  <path d="M 366,388 C 374,411 365,434 347,440" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.44"/>

  <!-- Plume 5 -->
  <path d="M 326,394 C 333,413 323,434 305,438 C 291,441 280,430 283,415 C 292,407 310,399 326,394 Z"
    fill="#3d1568" opacity="0.70"/>
  <path d="M 326,394 C 332,414 322,436 305,440" fill="none" stroke="#d4b0ff" stroke-width="1.1" opacity="0.38"/>

  <!-- Bord d'attaque droit -->
  <path d="
    M 284,232
    C 317,212 382,196 436,214
    C 472,227 479,268 464,310"
    fill="none" stroke="#c4a0ff" stroke-width="1.6" opacity="0.38"/>

  <!-- ═══════════════════════════════════════════════
       FLAMME — dessinée par-dessus les ailes
       ═══════════════════════════════════════════════ -->

  <!-- Halo extérieur -->
  <path d="
    M 256,108
    C 278,148  312,182  315,228
    C 318,272  302,320  256,358
    C 210,320  194,272  197,228
    C 200,182  234,148  256,108 Z"
    fill="url(#flameOuter)"
    filter="url(#flameGlow)"
    opacity="0.9"/>

  <!-- Cœur lumineux -->
  <path d="
    M 256,148
    C 268,175  288,198  290,234
    C 292,266  281,304  256,330
    C 231,304  220,266  222,234
    C 224,198  244,175  256,148 Z"
    fill="url(#flameInner)"/>

  <!-- Pointe lumineuse -->
  <circle cx="256" cy="196" r="24" fill="white" opacity="0.9" filter="url(#tipGlow)"/>
  <circle cx="256" cy="196" r="10" fill="white"/>
</svg>
