agents:
  default: chat
engine:
  base_url: http://localhost:11434
  context_window: 4096
  model: llama3.2
  provider: ollama
  temperature: 0.7
log_level: INFO
memory:
  backend: sqlite
  context_max_tokens: 2048
  context_min_score: 0.0
  context_top_k: 5
  path: ~/.seraphim/memory.db
  rag_backend: sqlite_fts
  rag_enabled: true
server:
  host: 0.0.0.0
  port: 7272
  reload: false
