# Seraphim Configuration
# Docs: https://github.com/YOUR_USERNAME/Seraphim

engine:
  provider: ollama
  model: llama3.2          # Change to any model available via `seraphim models`
  base_url: http://localhost:11434
  temperature: 0.7
  context_window: 4096

server:
  host: 0.0.0.0
  port: 7272
  reload: false

memory:
  backend: sqlite           # Options: sqlite | chromadb
  path: ~/.seraphim/memory.db

agents:
  default: chat             # Options: chat | coder | researcher

log_level: INFO             # Options: DEBUG | INFO | WARNING | ERROR
