agents:
  default: chat

# ── Engine ────────────────────────────────────────────────────────────────────
# provider: ollama | vllm | llamacpp
#
# vLLM (GPU) example for NVIDIA 4 GB VRAM (RTX 3050 Ti):
#   provider: vllm
#   model: Qwen/Qwen2.5-3B-Instruct-GPTQ-Int4   # ~1.8 GB in 4-bit
#   base_url: http://localhost:8000
#   vllm_port: 8000
#   vllm_gpu_memory_utilization: 0.85
#   vllm_max_model_len: 4096
#
# Start: seraphim vllm serve --background
# Stop : seraphim vllm stop
# Check: seraphim vllm status
engine:
  base_url: http://localhost:11434
  context_window: 4096
  model: qwen2.5:3b
  provider: ollama
  temperature: 0.7
  vllm_port: 8000
  vllm_gpu_memory_utilization: 0.85
  vllm_max_model_len: 4096

learning:
  auto_start: true
  interval_hours: 6.0
  min_new_traces: 3
  min_quality: 0.6
  run_grpo: false
  run_finetune: false

log_level: INFO
memory:
  backend: sqlite
  context_max_tokens: 2048
  context_min_score: 0.0
  context_top_k: 5
  path: ~/.seraphim/memory.db
  rag_backend: sqlite_fts
  rag_enabled: false
server:
  host: 0.0.0.0
  port: 7272
  reload: false
